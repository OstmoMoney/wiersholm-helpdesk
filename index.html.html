<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Helpdesk – Wiersholm</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f1;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text-primary: #1a1a18;
    --text-secondary: #6b6a64;
    --accent: #1a3a2a;
    --accent-light: #e8f0eb;
    --accent-mid: #2d6b47;
    --user-bg: #1a3a2a;
    --user-text: #f0f7f3;
    --bot-bg: #ffffff;
    --bot-border: #e2e0d8;
    --shadow: 0 2px 16px rgba(0,0,0,0.07);
    --radius: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .chat-container {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    height: 620px;
    overflow: hidden;
  }

  .chat-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
  }

  .header-icon {
    width: 40px;
    height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .header-icon svg {
    width: 20px;
    height: 20px;
    stroke: #f0f7f3;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .header-text h1 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }

  .header-text p {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
    font-weight: 300;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: #3dba6e;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px rgba(61,186,110,0.2);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeUp 0.25s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-items: flex-end; }
  .message.bot { align-items: flex-start; }

  .message-bubble {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    font-weight: 400;
  }

  .message.user .message-bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-bottom-right-radius: 4px;
  }

  .message.bot .message-bubble {
    background: var(--bot-bg);
    color: var(--text-primary);
    border: 1px solid var(--bot-border);
    border-bottom-left-radius: 4px;
  }

  .message-label {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 300;
    padding: 0 4px;
    font-family: 'DM Mono', monospace;
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 16px;
    background: var(--bot-bg);
    border: 1px solid var(--bot-border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    background: var(--text-secondary);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: scale(0.9); }
    30% { opacity: 1; transform: scale(1); }
  }

  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
  }

  .input-wrapper {
    flex: 1;
    position: relative;
  }

  textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-primary);
    background: var(--bg);
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 46px;
    max-height: 120px;
    transition: border-color 0.15s;
  }

  textarea::placeholder { color: var(--text-secondary); }
  textarea:focus { border-color: var(--accent-mid); }

  .send-btn {
    width: 46px;
    height: 46px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  .send-btn:hover { background: var(--accent-mid); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

  .send-btn svg {
    width: 18px;
    height: 18px;
    stroke: white;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .welcome-message {
    text-align: center;
    padding: 32px 24px;
    color: var(--text-secondary);
  }

  .welcome-message .icon {
    width: 48px;
    height: 48px;
    background: var(--accent-light);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }

  .welcome-message .icon svg {
    width: 24px;
    height: 24px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .welcome-message h2 {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .welcome-message p {
    font-size: 13px;
    line-height: 1.6;
    font-weight: 300;
    max-width: 320px;
    margin: 0 auto;
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 0 1 0 10h-2"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    </div>
    <div class="header-text">
      <h1>IT Helpdesk</h1>
      <p>Wiersholm IT-avdelingen</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome-message">
      <div class="icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      </div>
      <h2>Hva kan vi hjelpe med?</h2>
      <p>Beskriv problemet ditt så finner vi en løsning for deg.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="userInput"
        placeholder="Beskriv IT-problemet ditt..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
  const API_URL = "https://aurora.wiersholm.ai/api/v1/run/d059e090-2bc5-4ae2-b752-7f24acd2e147";
  const API_KEY = "sk-35jIxiFiTOiSN6lfjgixCXyGgNIzhU4pLVYKE3k6qis";
  const SESSION_ID = crypto.randomUUID();
  let isLoading = false;
  let welcomeShown = true;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function addMessage(text, role) {
    const container = document.getElementById('messages');

    if (welcomeShown) {
      container.innerHTML = '';
      welcomeShown = false;
    }

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = role === 'user' ? 'Deg' : 'IT Helpdesk';

    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    bubble.textContent = text;

    msg.appendChild(label);
    msg.appendChild(bubble);
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const typing = document.createElement('div');
    typing.className = 'message bot';
    typing.id = 'typing';

    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

    typing.appendChild(indicator);
    container.appendChild(typing);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const typing = document.getElementById('typing');
    if (typing) typing.remove();
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    addMessage(text, 'user');
    showTyping();

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': API_KEY
        },
        body: JSON.stringify({
          input_value: text,
          output_type: 'chat',
          input_type: 'chat',
          session_id: SESSION_ID
        })
      });

      const data = await response.json();
      const botText = data?.outputs?.[0]?.outputs?.[0]?.results?.message?.text
        || data?.outputs?.[0]?.outputs?.[0]?.messages?.[0]?.message
        || 'Beklager, noe gikk galt. Prøv igjen.';

      removeTyping();
      addMessage(botText, 'bot');
    } catch (err) {
      removeTyping();
      addMessage('Kunne ikke koble til IT-assistenten. Sjekk tilkoblingen og prøv igjen.', 'bot');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('userInput').focus();
  }
</script>
</body>
</html>
